<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Feliz Cumpleaños</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #f9f3ff 0%, #e8def8 100%);
            padding: 1rem;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 2rem 1.8rem;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(108, 92, 231, 0.20), 0 8px 16px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 460px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        h1 {
            color: #2d1b69;
            font-size: clamp(1.8rem, 7vw, 2.4rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .sub {
            color: #4a3a7a;
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            font-weight: 500;
            margin: 4px 0 2px 0;
            opacity: 0.85;
        }

        .fecha {
            background: #6c5ce7;
            color: white;
            font-weight: 600;
            display: inline-block;
            padding: 0.3rem 1.4rem;
            border-radius: 40px;
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            letter-spacing: 0.4px;
            margin: 6px 0 18px 0;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.30);
            white-space: nowrap;
        }

        .countdown {
            background: rgba(108, 92, 231, 0.08);
            border-radius: 30px;
            padding: 1rem 0.8rem;
            margin: 0 0 18px 0;
            border: 1px solid rgba(108, 92, 231, 0.12);
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .cd-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }

        .cd-num {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 700;
            color: #2d1b69;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }

        .cd-label {
            font-size: clamp(0.55rem, 1.4vw, 0.7rem);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b5b8a;
            opacity: 0.7;
            font-weight: 600;
            margin-top: 2px;
        }

        .cd-sep {
            color: #6c5ce7;
            font-weight: 300;
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            display: flex;
            align-items: center;
            opacity: 0.4;
            padding: 0 2px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 6px;
            width: 100%;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ddd6f0;
            border-radius: 30px;
            font-size: clamp(1rem, 2.5vw, 1.05rem);
            background: white;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus,
        textarea:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.12);
        }

        textarea {
            height: 110px;
            resize: vertical;
            border-radius: 24px;
            min-height: 90px;
        }

        button {
            background: #6c5ce7;
            color: white;
            font-weight: 700;
            font-size: clamp(1rem, 2.8vw, 1.15rem);
            padding: 15px 10px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.30);
            letter-spacing: 0.3px;
            margin-top: 4px;
            width: 100%;
            touch-action: manipulation;
        }

        button:hover:not(:disabled) {
            background: #5a4ac7;
            transform: scale(1.02);
            box-shadow: 0 10px 28px rgba(108, 92, 231, 0.40);
        }

        button:active:not(:disabled) {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.6;
            transform: scale(0.98);
            cursor: not-allowed;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.12);
        }

        .success-msg {
            background: #d4edda;
            color: #0b5e2e;
            font-weight: 600;
            padding: 14px 14px;
            border-radius: 60px;
            margin-top: 22px;
            display: none;
            border-left: 6px solid #28a745;
            font-size: clamp(0.9rem, 2.2vw, 0.95rem);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            word-break: break-word;
        }

        .error-msg {
            background: #f8d7da;
            color: #842029;
            font-weight: 500;
            padding: 12px 14px;
            border-radius: 60px;
            margin-top: 18px;
            display: none;
            border-left: 6px solid #dc3545;
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            word-break: break-word;
        }

        .footer-note {
            margin-top: 22px;
            color: #6b5b8a;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            opacity: 0.6;
            letter-spacing: 0.2px;
            padding: 0 4px;
        }

        @media (max-width: 420px) {
            .card {
                padding: 1.6rem 1.2rem;
                border-radius: 32px;
            }

            input,
            textarea {
                padding: 12px 14px;
                font-size: 0.95rem;
            }

            button {
                padding: 14px 10px;
                font-size: 1rem;
            }

            .fecha {
                font-size: 0.7rem;
                padding: 0.2rem 1rem;
            }

            .cd-item {
                min-width: 40px;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 1.2rem 0.9rem;
                border-radius: 28px;
            }

            h1 {
                font-size: 1.6rem;
            }
        }

        @media (min-width: 768px) {
            .card {
                padding: 2.4rem 2.4rem;
            }

            textarea {
                height: 120px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎂 Cumpleaños</h1>
        <div class="sub">Deja tu mensaje especial</div>
        <span class="fecha">28 de Junio</span>

        <div class="countdown" id="countdown" aria-label="Cuenta regresiva">
            <div class="cd-item">
                <span class="cd-num" id="cd-days">00</span>
                <span class="cd-label">Días</span>
            </div>
            <span class="cd-sep">:</span>
            <div class="cd-item">
                <span class="cd-num" id="cd-hours">00</span>
                <span class="cd-label">Horas</span>
            </div>
            <span class="cd-sep">:</span>
            <div class="cd-item">
                <span class="cd-num" id="cd-mins">00</span>
                <span class="cd-label">Minutos</span>
            </div>
            <span class="cd-sep">:</span>
            <div class="cd-item">
                <span class="cd-num" id="cd-secs">00</span>
                <span class="cd-label">Segundos</span>
            </div>
        </div>

        <form id="birthdayForm" novalidate>
            <input type="text" id="nameInput" placeholder="Tu nombre (opcional)" maxlength="60" autocomplete="off">
            <textarea id="messageInput" placeholder="Escribe tu mensaje aquí..." required></textarea>
            <button type="submit" id="submitBtn">Enviar mensaje</button>
        </form>

        <div id="successMessage" class="success-msg">¡Mensaje guardado! Gracias por tu saludo</div>
        <div id="errorMessage" class="error-msg">No se pudo enviar. Intenta de nuevo.</div>
        <div class="footer-note">Los veré el día de mi cumpleaños</div>
    </div>

    <script>
        (function () {
            const form = document.getElementById('birthdayForm');
            const nameIn = document.getElementById('nameInput');
            const msgIn = document.getElementById('messageInput');
            const btn = document.getElementById('submitBtn');
            const okMsg = document.getElementById('successMessage');
            const errMsg = document.getElementById('errorMessage');

            const URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdaocdngExwe9XwYjveLdlfCi1XIN5eUqHL6eW-XCNwZKVcSg/formResponse';
            const ENTRY_NAME = 'entry.1307904677';
            const ENTRY_MSG = 'entry.2080567318';

            const cdDays = document.getElementById('cd-days');
            const cdHours = document.getElementById('cd-hours');
            const cdMins = document.getElementById('cd-mins');
            const cdSecs = document.getElementById('cd-secs');

            const target = new Date('2026-06-28T00:00:00-04:00');

            function pad(n) { return String(n).padStart(2, '0'); }

            function updateCountdown() {
                const now = new Date();
                const diff = target - now;

                if (diff <= 0) {
                    cdDays.textContent = '00';
                    cdHours.textContent = '00';
                    cdMins.textContent = '00';
                    cdSecs.textContent = '00';
                    return;
                }

                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);

                cdDays.textContent = pad(d);
                cdHours.textContent = pad(h);
                cdMins.textContent = pad(m);
                cdSecs.textContent = pad(s);
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);

            function resetMsgs() {
                okMsg.style.display = 'none';
                errMsg.style.display = 'none';
            }

            function showOk() {
                okMsg.style.display = 'block';
                errMsg.style.display = 'none';
            }

            function showErr(msg) {
                errMsg.textContent = msg || 'No se pudo enviar. Intenta de nuevo.';
                errMsg.style.display = 'block';
                okMsg.style.display = 'none';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                resetMsgs();

                const name = nameIn.value.trim() || 'Anónimo';
                const msg = msgIn.value.trim();

                if (!msg) {
                    showErr('Escribe un mensaje antes de enviar.');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = 'Enviando...';

                const data = new FormData();
                data.append(ENTRY_NAME, name);
                data.append(ENTRY_MSG, msg);

                const ctrl = new AbortController();
                const timer = setTimeout(() => ctrl.abort(), 5000);

                fetch(URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: data,
                    signal: ctrl.signal,
                    headers: { 'Accept': 'application/json' }
                })
                    .then(() => {
                        clearTimeout(timer);
                        showOk();
                        form.reset();
                        btn.innerHTML = 'Enviar otro mensaje';
                        btn.disabled = false;
                    })
                    .catch((err) => {
                        clearTimeout(timer);
                        if (err.name === 'AbortError') {
                            showErr('Tiempo de espera agotado. Revisa tu conexión.');
                        } else {
                            showErr('Error de conexión. Revisa tu internet.');
                        }
                        btn.innerHTML = 'Reintentar';
                        btn.disabled = false;
                    });
            });

            nameIn.addEventListener('input', resetMsgs);
            msgIn.addEventListener('input', resetMsgs);

            errMsg.addEventListener('click', function () { this.style.display = 'none'; });
            okMsg.addEventListener('click', function () { this.style.display = 'none'; });

            nameIn.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    msgIn.focus();
                }
            });

        })();
    </script>
</body>

</html>
