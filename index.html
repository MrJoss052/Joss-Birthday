<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Feliz Cumpleaños Joss</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1>🎂 Cumpleaños de Joss 🎂</h1>
        <div class="sub">16 → 17 años</div>
        <span class="fecha">28 de Junio</span>

        <div class="countdown" id="countdown">
            <div class="cd-item"><span class="cd-num" id="cd-days">00</span><span class="cd-label">Días</span></div>
            <span class="cd-sep">:</span>
            <div class="cd-item"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Horas</span></div>
            <span class="cd-sep">:</span>
            <div class="cd-item"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Min</span></div>
            <span class="cd-sep">:</span>
            <div class="cd-item"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Seg</span></div>
        </div>

        <form id="birthdayForm" novalidate>
            <input type="text" id="nameInput" placeholder="Tu nombre (opcional)" maxlength="60" autocomplete="off">
            <textarea id="messageInput" placeholder="Escribe tu mensaje aquí..." required></textarea>
            <button type="submit" id="submitBtn">Enviar mensaje</button>
        </form>

        <div id="successMessage" class="success-msg">¡Mensaje guardado! Gracias por tu saludo</div>
        <div id="errorMessage" class="error-msg">No se pudo enviar. Intenta de nuevo.</div>
        <div class="footer-note">Los veré el día de mi cumpleaños</div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <h3>¿Enviar mensaje?</h3>
            <p>Tu mensaje se guardará para siempre. ¿Estás seguro?</p>
            <div class="modal-actions">
                <button class="modal-btn-yes" id="modalYes">Sí, enviar</button>
                <button class="modal-btn-no" id="modalNo">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="web.js"></script>
</body>

</html>
