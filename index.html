<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Feliz Cumpleaños</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #f9f3ff 0%, #e8def8 100%);
            padding: 1rem;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 2rem 1.8rem;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(108, 92, 231, 0.20), 0 8px 16px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 460px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        h1 {
            color: #2d1b69;
            font-size: clamp(1.8rem, 7vw, 2.4rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .sub {
            color: #4a3a7a;
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            font-weight: 500;
            margin: 4px 0 2px 0;
            opacity: 0.85;
        }

        .fecha {
            background: #6c5ce7;
            color: white;
            font-weight: 600;
            display: inline-block;
            padding: 0.3rem 1.4rem;
            border-radius: 40px;
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            letter-spacing: 0.4px;
            margin: 6px 0 18px 0;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.30);
            white-space: nowrap;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 6px;
            width: 100%;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ddd6f0;
            border-radius: 30px;
            font-size: clamp(1rem, 2.5vw, 1.05rem);
            background: white;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus,
        textarea:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.12);
        }

        textarea {
            height: 110px;
            resize: vertical;
            border-radius: 24px;
            min-height: 90px;
        }

        button {
            background: #6c5ce7;
            color: white;
            font-weight: 700;
            font-size: clamp(1rem, 2.8vw, 1.15rem);
            padding: 15px 10px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.30);
            letter-spacing: 0.3px;
            margin-top: 4px;
            width: 100%;
            touch-action: manipulation;
        }

        button:hover:not(:disabled) {
            background: #5a4ac7;
            transform: scale(1.02);
            box-shadow: 0 10px 28px rgba(108, 92, 231, 0.40);
        }

        button:active:not(:disabled) {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.6;
            transform: scale(0.98);
            cursor: not-allowed;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.12);
        }

        .success-msg {
            background: #d4edda;
            color: #0b5e2e;
            font-weight: 600;
            padding: 14px 14px;
            border-radius: 60px;
            margin-top: 22px;
            display: none;
            border-left: 6px solid #28a745;
            font-size: clamp(0.9rem, 2.2vw, 0.95rem);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            word-break: break-word;
        }

        .error-msg {
            background: #f8d7da;
            color: #842029;
            font-weight: 500;
            padding: 12px 14px;
            border-radius: 60px;
            margin-top: 18px;
            display: none;
            border-left: 6px solid #dc3545;
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            word-break: break-word;
        }

        .footer-note {
            margin-top: 22px;
            color: #6b5b8a;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            opacity: 0.6;
            letter-spacing: 0.2px;
            padding: 0 4px;
        }

        @media (max-width: 420px) {
            .card {
                padding: 1.6rem 1.2rem;
                border-radius: 32px;
            }

            input,
            textarea {
                padding: 12px 14px;
                font-size: 0.95rem;
            }

            button {
                padding: 14px 10px;
                font-size: 1rem;
            }

            .fecha {
                font-size: 0.7rem;
                padding: 0.2rem 1rem;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 1.2rem 0.9rem;
                border-radius: 28px;
            }

            h1 {
                font-size: 1.6rem;
            }
        }

        @media (min-width: 768px) {
            .card {
                padding: 2.4rem 2.4rem;
            }

            textarea {
                height: 120px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎂 Cumpleaños</h1>
        <div class="sub">✨ Deja tu mensaje especial</div>
        <span class="fecha">📅 28 de Junio</span>

        <form id="birthdayForm" novalidate>
            <input type="text" id="nameInput" placeholder="Tu nombre (opcional)" maxlength="60" autocomplete="off">
            <textarea id="messageInput" placeholder="Escribe tu mensaje aquí..." required></textarea>
            <button type="submit" id="submitBtn">💌 Enviar mensaje</button>
        </form>

        <div id="successMessage" class="success-msg">✅ ¡Mensaje guardado! Gracias por tu saludo ❤️</div>
        <div id="errorMessage" class="error-msg">⚠️ No se pudo enviar. Intenta de nuevo.</div>
        <div class="footer-note">🎈 Los veré el día de mi cumpleaños</div>
    </div>

    <script>
        (function () {
            const form = document.getElementById('birthdayForm');
            const nameInput = document.getElementById('nameInput');
            const messageInput = document.getElementById('messageInput');
            const submitBtn = document.getElementById('submitBtn');
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');

            const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdaocdngExwe9XwYjveLdlfCi1XIN5eUqHL6eW-XCNwZKVcSg/formResponse';
            const ENTRY_NAME = 'entry.1307904677';
            const ENTRY_MSG = 'entry.2080567318';

            function resetMessages() {
                successDiv.style.display = 'none';
                errorDiv.style.display = 'none';
            }

            function showSuccess() {
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            }

            function showError(msg) {
                errorDiv.textContent = msg || '⚠️ No se pudo enviar. Intenta de nuevo.';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                resetMessages();

                const rawName = nameInput.value.trim();
                const name = rawName === '' ? 'Anónimo' : rawName;
                const message = messageInput.value.trim();

                if (message === '') {
                    showError('✏️ Escribe un mensaje antes de enviar.');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '⏳ Enviando...';

                const formData = new FormData();
                formData.append(ENTRY_NAME, name);
                formData.append(ENTRY_MSG, message);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                fetch(FORM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData,
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/json'
                    }
                })
                    .then(() => {
                        clearTimeout(timeoutId);
                        showSuccess();
                        form.reset();
                        submitBtn.innerHTML = '💌 Enviar otro mensaje';
                        submitBtn.disabled = false;
                    })
                    .catch((err) => {
                        clearTimeout(timeoutId);
                        if (err.name === 'AbortError') {
                            showError('⏱️ Tiempo de espera agotado. Revisa tu conexión.');
                        } else {
                            showError('⚠️ Error de conexión. Revisa tu internet.');
                        }
                        console.warn('Fetch error:', err);
                        submitBtn.innerHTML = '💌 Reintentar';
                        submitBtn.disabled = false;
                    });
            });

            nameInput.addEventListener('input', resetMessages);
            messageInput.addEventListener('input', resetMessages);

            errorDiv.addEventListener('click', function () {
                this.style.display = 'none';
            });
            successDiv.addEventListener('click', function () {
                this.style.display = 'none';
            });

            nameInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    messageInput.focus();
                }
            });

        })();
    </script>
</body>

</html>
